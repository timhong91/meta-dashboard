<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메타 광고 통합 대시보드</title>
<style>
  :root{
    --bg:#0f1117; --card:#1a1d27; --line:#2c3142;
    --txt:#e8eaf0; --sub:#9aa0b4; --accent:#5b8def;
    --green:#34d399; --green-bg:#0d2e23;
    --yellow:#fbbf24; --yellow-bg:#332a0d;
    --red:#f87171; --red-bg:#331616;
    --gray:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.5;padding:20px;max-width:1100px;margin:0 auto}
  /* 비밀번호 게이트 */
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .gate-box{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px 28px;width:100%;max-width:360px;text-align:center}
  .gate-box h2{font-size:18px;margin-bottom:6px}
  .gate-box p{font-size:13px;color:var(--sub);margin-bottom:20px}
  .gate-box input{width:100%;padding:13px 15px;border-radius:11px;border:1px solid var(--line);background:#10131b;color:var(--txt);font-size:16px;margin-bottom:12px}
  .gate-box input:focus{outline:none;border-color:var(--accent)}
  .gate-box button{width:100%;padding:13px;border-radius:11px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  .gate-box button:active{opacity:.85}
  #err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
  .meta-info{font-size:12px;color:var(--sub);text-align:right}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .tab{padding:9px 15px;border-radius:10px;background:var(--card);border:1px solid var(--line);
    color:var(--sub);cursor:pointer;font-size:14px;font-weight:600;transition:.15s;white-space:nowrap}
  .tab:hover{border-color:var(--accent);color:var(--txt)}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .periodtabs .tab.active{background:#2d3550;border-color:var(--accent);color:#fff}
  .section-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:0 0 7px 2px;font-weight:700}
  .headcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  .headcard .acct{font-size:17px;font-weight:700}
  .headcard .range{font-size:13px;color:var(--sub);margin-top:3px}
  .roas-badge{font-size:28px;font-weight:800;padding:6px 16px;border-radius:12px}
  .roas-badge small{font-size:13px;font-weight:600;opacity:.8}
  .badge-green{color:var(--green);background:var(--green-bg)}
  .badge-yellow{color:var(--yellow);background:var(--yellow-bg)}
  .badge-red{color:var(--red);background:var(--red-bg)}
  .badge-gray{color:var(--gray);background:#1a1d27}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px}
  .kpi .label{font-size:12px;color:var(--sub);font-weight:600;margin-bottom:6px}
  .kpi .value{font-size:20px;font-weight:700;letter-spacing:-.5px}
  .kpi .value small{font-size:13px;color:var(--sub);font-weight:600}
  .kpi.primary{background:linear-gradient(135deg,#1e2536,#1a1d27)}
  .kpi.accent .value{color:var(--accent)}
  .empty{color:var(--sub);font-size:14px;padding:30px;text-align:center}
  /* 전체 비교 테이블 */
  table.cmp{width:100%;border-collapse:collapse;font-size:13px}
  table.cmp th{text-align:right;color:var(--sub);font-weight:700;padding:9px 10px;border-bottom:1px solid var(--line);font-size:11px;white-space:nowrap}
  table.cmp th:first-child{text-align:left}
  table.cmp td{text-align:right;padding:13px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.cmp td.pname{text-align:left;font-weight:700;font-size:14px}
  table.cmp td.accent{color:var(--accent);font-weight:600}
  table.cmp td.muted{text-align:center;color:var(--sub)}
  table.cmp tr.totalrow td{border-top:2px solid var(--accent);border-bottom:none;font-weight:800;padding-top:14px}
  .rtag{display:inline-block;padding:3px 10px;border-radius:8px;font-weight:700;font-size:13px}
  .foot{margin-top:22px;font-size:11px;color:var(--sub);line-height:1.7;border-top:1px solid var(--line);padding-top:14px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h2>🔒 메타 광고 대시보드</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password">
    <button id="enter">열기</button>
    <div id="err"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div><h1>📊 메타 광고 통합 대시보드</h1></div>
    <div class="meta-info">
      최종 갱신: <span id="ts">2026-07-01 05:55</span><br>
      통화: KRW · 1시간마다 자동 갱신
    </div>
  </header>

  <div class="section-label">계정 선택</div>
  <div class="tabs accttabs" id="accttabs"></div>

  <div class="section-label">기간 선택</div>
  <div class="tabs periodtabs" id="periodtabs"></div>

  <div class="headcard">
    <div>
      <div class="acct" id="h-acct">—</div>
      <div class="range" id="h-range">—</div>
    </div>
    <div class="roas-badge" id="h-roas">—</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="foot">
    <span class="dot" style="background:var(--green)"></span>ROAS 1.3↑ 양호 &nbsp;
    <span class="dot" style="background:var(--yellow)"></span>1.0~1.3 보통 &nbsp;
    <span class="dot" style="background:var(--red)"></span>1.0↓ 적자<br>
    ※ 추정매출 = ROAS × 광고비로 역산. 구매수는 omni_purchase 기준. '오늘'은 집계 진행 중이라 적게 보일 수 있어요.
  </div>
</div>

// ── 복호화 (Web Crypto API) ──
function b64(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }
async function decryptPayload(password){
  const salt = b64(ENC.salt), iv = b64(ENC.iv), ct = b64(ENC.ct);
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:ENC.iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

let DATA = {}, curAcct = "", curPeriod = "last_7d";
const PERIODS = [["today","오늘"],["yesterday","어제"],["last_7d","최근 7일"],["last_30d","최근 30일"],["maximum","전체 기간"]];
const won = n => n==null ? "—" : "₩"+Math.round(n).toLocaleString();
const intc = n => n==null ? "—" : Math.round(n).toLocaleString();
function roasClass(r){ if(r==null) return "badge-gray"; if(r>=1.3) return "badge-green"; if(r>=1.0) return "badge-yellow"; return "badge-red"; }

function buildTabs(){
  const at = document.getElementById("accttabs"); at.innerHTML = "";
  ["전체", ...Object.keys(DATA)].forEach(name=>{
    const d = document.createElement("div");
    d.className = "tab"+(name===curAcct?" active":"");
    d.textContent = name==="전체" ? "📊 전체" : name;
    d.onclick = ()=>{curAcct=name; render();};
    at.appendChild(d);
  });
  const pt = document.getElementById("periodtabs"); pt.innerHTML = "";
  PERIODS.forEach(([key,label])=>{
    const d = document.createElement("div");
    d.className = "tab"+(key===curPeriod?" active":"");
    d.textContent = label; d.onclick = ()=>{curPeriod=key; render();};
    pt.appendChild(d);
  });
}

function render(){
  buildTabs();
  const grid = document.getElementById("grid");
  if(curAcct==="전체"){ grid.style.display="block"; renderAll(); return; }
  grid.style.display="grid";
  const p = DATA[curAcct].periods[curPeriod];
  document.getElementById("h-acct").textContent = curAcct;
  if(!p){
    document.getElementById("h-range").textContent = "이 기간 데이터 없음";
    const rb = document.getElementById("h-roas"); rb.className = "roas-badge badge-gray"; rb.innerHTML = "—";
    document.getElementById("grid").innerHTML = '<div class="empty">이 기간에는 집행 데이터가 없어요.</div>';
    return;
  }
  const revenue = (p.roas!=null) ? p.roas*p.spend : null;
  const cpa = (p.purch && p.purch>0) ? p.spend/p.purch : null;
  const aov = (revenue!=null && p.purch>0) ? revenue/p.purch : null;
  document.getElementById("h-range").textContent = p.r;
  const rb = document.getElementById("h-roas");
  rb.className = "roas-badge "+roasClass(p.roas);
  rb.innerHTML = (p.roas==null?"—":p.roas.toFixed(2))+"<small>x ROAS</small>";
  const cards = [
    ["광고비", won(p.spend), "primary"],
    ["추정매출", won(revenue), "primary accent"],
    ["구매수", intc(p.purch)+"<small> 건</small>", ""],
    ["CPA (구매당비용)", won(cpa), ""],
    ["객단가(AOV)", won(aov), ""],
    ["CTR", (p.ctr==null?"—":p.ctr.toFixed(2))+"<small>%</small>", ""],
    ["CPC (클릭당비용)", won(p.cpc), ""],
    ["CPM (1천노출당)", won(p.cpm), ""],
    ["노출수", intc(p.imp), ""],
    ["클릭수", intc(p.clk), ""],
    ["도달수", intc(p.reach), ""],
    ["빈도", (p.freq==null?"—":p.freq.toFixed(2))+"<small> 회</small>", ""]
  ];
  const grid = document.getElementById("grid"); grid.innerHTML = "";
  cards.forEach(([label,val,cls])=>{
    const el = document.createElement("div");
    el.className = "kpi "+cls;
    el.innerHTML = `<div class="label">${label}</div><div class="value">${val}</div>`;
    grid.appendChild(el);
  });
}

// ── 전체 탭: 제품별 합산 비교 ──
const GROUPS = [
  {label:"브이파워", accts:["브이파워"]},
  {label:"커큐민", accts:["커큐민 (닥터다니엘)"]},
  {label:"레프제로", accts:["레프제로"]},
  {label:"스노제로", accts:["스노제로"]},
  {label:"시알닉스 (2개 합산)", accts:["시알닉스 ① 더강해진사람들","시알닉스 ② 본계정"]},
];
function aggregate(names, period){
  let spend=0,imp=0,clk=0,reach=0,purch=0,rev=0,any=false;
  names.forEach(n=>{
    const p = DATA[n] && DATA[n].periods[period];
    if(!p) return;
    any=true;
    spend+=p.spend||0; imp+=p.imp||0; clk+=p.clk||0; reach+=p.reach||0; purch+=p.purch||0;
    if(p.roas!=null) rev += p.roas*p.spend;
  });
  if(!any) return null;
  return {spend,imp,clk,reach,purch,rev,
    roas: spend>0?rev/spend:null, ctr: imp>0?clk/imp*100:null,
    cpc: clk>0?spend/clk:null, cpa: purch>0?spend/purch:null};
}
function rowHtml(label, a, isTotal){
  if(!a) return `<tr><td class="pname">${label}</td><td colspan="5" class="muted">데이터 없음</td></tr>`;
  const cls = isTotal ? ' class="totalrow"' : '';
  return `<tr${cls}><td class="pname">${label}</td><td>${won(a.spend)}</td>`+
    `<td class="accent">${won(a.rev)}</td>`+
    `<td><span class="rtag ${roasClass(a.roas)}">${a.roas!=null?a.roas.toFixed(2):"—"}</span></td>`+
    `<td>${intc(a.purch)}</td><td>${won(a.cpa)}</td></tr>`;
}
function renderAll(){
  const rlabel = (DATA[Object.keys(DATA)[0]].periods[curPeriod]||{}).r || "";
  document.getElementById("h-acct").textContent = "📊 전체 (4개 제품)";
  document.getElementById("h-range").textContent = rlabel;
  const total = aggregate(GROUPS.flatMap(g=>g.accts), curPeriod);
  const rb = document.getElementById("h-roas");
  rb.className = "roas-badge "+roasClass(total?total.roas:null);
  rb.innerHTML = (total&&total.roas!=null?total.roas.toFixed(2):"—")+"<small>x 전체 ROAS</small>";
  let h = '<div style="overflow-x:auto"><table class="cmp"><thead><tr>'+
    '<th>제품</th><th>광고비</th><th>추정매출</th><th>ROAS</th><th>구매</th><th>CPA</th></tr></thead><tbody>';
  GROUPS.forEach(g=>{ h += rowHtml(g.label, aggregate(g.accts, curPeriod), false); });
  h += rowHtml("합계", total, true);
  h += '</tbody></table></div>';
  document.getElementById("grid").innerHTML = h;
}

async function unlock(password){
  const payload = await decryptPayload(password);  // 틀리면 throw
  DATA = payload.data;
  curAcct = "전체";
  document.getElementById("ts").textContent = payload.ts || "2026-07-01 05:55";
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  render();
}

document.getElementById("enter").onclick = tryUnlock;
document.getElementById("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") tryUnlock(); });
async function tryUnlock(){
  const pw = document.getElementById("pw").value;
  const err = document.getElementById("err");
  err.textContent = "확인 중...";
  try {
    await unlock(pw);
    try { sessionStorage.setItem("dash_pw", pw); } catch(e){}
  } catch(e){
    err.textContent = "비밀번호가 틀렸어요.";
    document.getElementById("pw").value = "";
  }
}

// 같은 탭에서 새로고침 시 재입력 생략
(async function(){
  let saved = null;
  try { saved = sessionStorage.getItem("dash_pw"); } catch(e){}
  if(saved){ try { await unlock(saved); } catch(e){ try{sessionStorage.removeItem("dash_pw");}catch(_){} } }
  document.getElementById("pw").focus();
})();
</script>
